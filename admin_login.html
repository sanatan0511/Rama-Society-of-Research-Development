<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Ramanujan Society of Research</title>
  <style>
    /* Reset CSS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      color: #333;
      background-color: #f5f5f5;
    }

    /* Admin Login Page */
    .login-page {
      padding: 60px 20px;
      text-align: center;
      background-color: #f5f5f5;
    }

    .login-page h2 {
      font-size: 2rem;
      margin-bottom: 30px;
    }

    .login-page form {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 400px;
      margin: 0 auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .login-page input {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      max-width: 300px;
      font-size: 1rem;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .login-page button {
      padding: 10px 20px;
      font-size: 1.2rem;
      background-color: #7b1d1d;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login-page button:hover {
      background-color: #ffd700;
    }
  </style>
</head>
<body>
  <!-- Admin Login Form -->
  <div class="login-page">
    <h2>Admin Login</h2>
    <form action="admin_login_submit.php" method="POST">
      <input type="text" name="username" placeholder="Enter Username" required>
      <input type="password" name="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
